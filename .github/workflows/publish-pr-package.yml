name: "📦 Publish PR Package"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-pr-package-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish package preview
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Set preview version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const versionWithoutBuild = pkg.version.split('+')[0];
          const prerelease = `pr.${process.env.PR_NUMBER}.${process.env.RUN_NUMBER}.${process.env.RUN_ATTEMPT}`;

          pkg.version = versionWithoutBuild.includes('-')
            ? `${versionWithoutBuild}.${prerelease}`
            : `${versionWithoutBuild}-${prerelease}`;

          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Configure GitHub Packages auth
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://npm.pkg.github.com"
          scope: "@${{ github.repository_owner }}"

      - name: Publish to GitHub Packages
        run: pnpm publish --registry https://npm.pkg.github.com --no-git-checks --tag pr-${{ github.event.pull_request.number }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
